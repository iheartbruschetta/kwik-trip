function milesBetween(a, b) {
  const R = 3958.8;
  const toRad = (d) => (d * Math.PI) / 180;
  const dLat = toRad(b.lat - a.lat);
  const dLng = toRad(b.lng - a.lng);
  const s = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

function pinHtml(visited, selected) {
  const w = selected ? 34 : 26;
  const fill = visited ? COLORS.gold : '#FFFFFF';
  const stroke = selected ? COLORS.ink : visited ? COLORS.blue : COLORS.red;
  const dot = visited ? COLORS.blue : COLORS.red;
  return `<svg width="${w}" height="${Math.round(w * 1.33)}" viewBox="0 0 24 32" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0 1px 2px rgba(16,24,40,0.35));">
    <path d="M12 1C6 1 1.2 5.8 1.2 11.8c0 7.4 10.8 19 10.8 19s10.8-11.6 10.8-19C22.8 5.8 18 1 12 1z" fill="${fill}" stroke="${stroke}" stroke-width="${selected ? 2 : 1.5}"/>
    <circle cx="12" cy="11.8" r="4.2" fill="${dot}"/>
  </svg>`;
}

    <svg viewBox="0 0 120 14" style={{ width }} aria-hidden="true">

      <path d="M98 1 L114 7 L98 13 Z" fill={COLORS.gold} />
    </svg>
  );
}

function StarRating({ rating, onChange, size = 24, readOnly = false }) {
  const [hoverRating, setHoverRating] = useState(null);
  const displayRating = hoverRating !== null ? hoverRating : rating;
  const stars = [1, 2, 3, 4, 5];

  return (
    <div style={{ display: 'inline-flex', gap: '3px' }} onMouseLeave={() => setHoverRating(null)}>
      {stars.map((starIndex) => {
        const fillAmount = Math.min(Math.max(displayRating - (starIndex - 1), 0), 1) * 100;
        return (
          <div key={starIndex} style={{ position: 'relative', width: size, height: size }}>
            <Star size={size} color={COLORS.starEmpty} fill={COLORS.starEmpty} strokeWidth={0} />
            <div style={{ position: 'absolute', top: 0, left: 0, width: `${fillAmount}%`, height: '100%', overflow: 'hidden' }}>
              <Star size={size} color={COLORS.gold} fill={COLORS.gold} strokeWidth={0} />
            </div>
            {!readOnly && (
              <>
                <button
                  type="button"
                  onMouseEnter={() => setHoverRating(starIndex - 0.5)}
                  onClick={() => onChange(starIndex - 0.5)}
                  className={FOCUS_RING}
                  style={{ position: 'absolute', top: 0, left: 0, width: '50%', height: '100%', background: 'transparent', border: 'none', cursor: 'pointer', padding: 0 }}
                  aria-label={`Rate ${starIndex - 0.5} stars`}
                />
                <button
                  type="button"
                  onMouseEnter={() => setHoverRating(starIndex)}
                  onClick={() => onChange(starIndex)}
                  className={FOCUS_RING}
                  style={{ position: 'absolute', top: 0, right: 0, width: '50%', height: '100%', background: 'transparent', border: 'none', cursor: 'pointer', padding: 0 }}
                  aria-label={`Rate ${starIndex} stars`}
                />
              </>
            )}
          </div>
        );
      })}
    </div>
  );
}

function Label({ children }) {
  return (
    <span
      className="block text-xs uppercase mb-1.5"
      style={{ color: COLORS.muted, fontFamily: FONT_DISPLAY, fontWeight: 600, letterSpacing: '0.1em' }}
    >
      {children}
    </span>
  );
}

function VisitForm({ onAdd, onCancel }) {
  const [date, setDate] = useState(() => new Date().toISOString().split('T')[0]);
  const [rating, setRating] = useState(0);
  const [review, setReview] = useState('');
  const [tags, setTags] = useState([]);
  const [error, setError] = useState('');

  function toggleTag(tag) {
    setTags((prev) => (prev.includes(tag) ? prev.filter((t) => t !== tag) : [...prev, tag]));
  }

  function handleSubmit() {
    if (rating === 0) return setError('Tap the stars to rate this stop');
    onAdd({ date, rating, review: review.trim(), tags });
  }

  return (
    <div className="rounded-xl p-4 space-y-3 border" style={{ backgroundColor: COLORS.bg, borderColor: COLORS.border }}>
      <div>
        <Label>Date</Label>
        <div className="flex items-center gap-2 rounded-lg px-3 py-2 border" style={{ borderColor: COLORS.border, backgroundColor: COLORS.card }}>
          <Calendar size={15} style={{ color: COLORS.muted }} className="flex-shrink-0" />
          <input
            type="date"
            value={date}
            onChange={(e) => setDate(e.target.value)}
            className={`flex-1 outline-none text-sm bg-transparent ${FOCUS_RING}`}
            style={{ color: COLORS.ink, fontFamily: FONT_BODY }}
          />
        </div>
      </div>

      <div>
        <Label>Rating</Label>
        <StarRating rating={rating} onChange={setRating} size={28} />
      </div>

      <div>
        <Label>The store itself</Label>
        <div className="flex flex-wrap gap-2">
          {HIGHLIGHT_OPTIONS.map((tag) => {
            const active = tags.includes(tag);
            return (
              <button
                key={tag}
                type="button"
                onClick={() => toggleTag(tag)}
                className={`px-2.5 py-1 rounded-full text-xs border transition-colors ${FOCUS_RING}`}
                style={active
                  ? { backgroundColor: COLORS.blue, borderColor: COLORS.blue, color: '#FFFFFF' }
                  : { backgroundColor: COLORS.card, borderColor: COLORS.border, color: COLORS.muted }}
              >
                {tag}
              </button>
            );
          })}
        </div>
      </div>

      <div>
        <Label>Review</Label>
        <textarea
          value={review}
          onChange={(e) => setReview(e.target.value)}
          placeholder="How was this one?"
          rows={2}
          className={`w-full rounded-lg px-3 py-2 text-sm outline-none resize-none border ${FOCUS_RING}`}
          style={{ borderColor: COLORS.border, backgroundColor: COLORS.card, color: COLORS.ink, fontFamily: FONT_BODY }}
        />
      </div>

      {error && <p className="text-xs" style={{ color: COLORS.red }}>{error}</p>}

      <div className="flex gap-2">
        <button
          type="button"
          onClick={handleSubmit}
          className={`flex-1 rounded-lg py-2 text-sm font-semibold transition-opacity hover:opacity-90 ${FOCUS_RING}`}
          style={{ backgroundColor: COLORS.red, color: '#FFFFFF' }}
        >
          Save visit
        </button>
        <button
          type="button"
          onClick={onCancel}
          className={`px-4 rounded-lg py-2 text-sm border transition-opacity hover:opacity-70 ${FOCUS_RING}`}
          style={{ backgroundColor: COLORS.card, borderColor: COLORS.border, color: COLORS.muted }}
        >
          Cancel
        </button>
      </div>
    </div>
  );
}

function KwikTripLog() {
  const [locations, setLocations] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('map');
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('All');
  const [selectedId, setSelectedId] = useState(null);
  const [showVisitForm, setShowVisitForm] = useState(false);
  const [adding, setAdding] = useState(false);
  const [pendingCoords, setPendingCoords] = useState(null);
  const [newStopName, setNewStopName] = useState('');
  const [tileError, setTileError] = useState(false);
  const [mapReady, setMapReady] = useState(false);
  const [leafletReady, setLeafletReady] = useState(false);

  const mapContainerRef = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef({});
  const pendingMarkerRef = useRef(null);
  const addingRef = useRef(false);
  const detailRef = useRef(null);

  useEffect(() => { addingRef.current = adding; }, [adding]);

  // Load Leaflet from CDN
  useEffect(() => {
    if (window.L) { setLeafletReady(true); return; }
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
    document.head.appendChild(link);
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
    script.onload = () => setLeafletReady(true);
    document.body.appendChild(script);
  }, []);

  // Load saved data (and migrate older saves to the Wisconsin-only list)
  useEffect(() => {
    let mounted = true;
    async function load() {
      let stored = null;
      let version = 1;
      try {
        const raw = localStorage.getItem(STORAGE_KEY_LOCATIONS);
        if (raw) stored = JSON.parse(raw);
      } catch (e) { /* nothing saved yet */ }
      try {
        const v = localStorage.getItem(STORAGE_KEY_SEED_VERSION);
        if (v) version = Number(v);
      } catch (e) { /* first run */ }

      let locs;
      if (!stored) {
        locs = SEED_LOCATIONS.map((l) => ({ ...l, visits: [] }));
      } else if (version < SEED_VERSION) {
        const kept = stored
          .filter((l) => (l.visits && l.visits.length > 0) || String(l.id).startsWith('custom-'))
          .map((l) => {
            const s = SEED_LOCATIONS.find((x) => x.id === l.id);
            return s ? { ...l, name: s.name, city: s.city, state: s.state, lat: s.lat, lng: s.lng } : l;
          });
        const keptIds = new Set(kept.map((l) => l.id));
        const additions = SEED_LOCATIONS.filter((s) => !keptIds.has(s.id)).map((s) => ({ ...s, visits: [] }));
        locs = [...kept, ...additions];
      } else {
        locs = stored;
      }

      if (mounted) {
        setLocations(locs);
        setLoading(false);
      }
      try {
        localStorage.setItem(STORAGE_KEY_LOCATIONS, JSON.stringify(locs));
        localStorage.setItem(STORAGE_KEY_SEED_VERSION, String(SEED_VERSION));
      } catch (e) { /* will retry on next save */ }
    }
    load();
    return () => { mounted = false; };
  }, []);

  // Init map once Leaflet + data are ready
  useEffect(() => {
    if (!leafletReady || loading || mapRef.current || !mapContainerRef.current) return;
    const L = window.L;
    const map = L.map(mapContainerRef.current, { zoomControl: true, attributionControl: true })
      .setView([MARSHALL.lat, MARSHALL.lng], 8);
    const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors',
    });
    tiles.on('tileerror', () => setTileError(true));
    tiles.addTo(map);
    map.on('click', (e) => {
      if (addingRef.current) {
        setPendingCoords({ lat: e.latlng.lat, lng: e.latlng.lng });
        setAdding(false);
      } else {
        setSelectedId(null);
        setShowVisitForm(false);
      }
    });
    mapRef.current = map;
    setTimeout(() => map.invalidateSize(), 100);
    setMapReady(true);
  }, [leafletReady, loading]);

  // Keep the map alive when hidden behind the Diary tab
  useEffect(() => {
    if (tab === 'map' && mapRef.current) {
      setTimeout(() => mapRef.current && mapRef.current.invalidateSize(), 120);
    }
  }, [tab]);

  const visible = useMemo(() => {
    return locations
      .filter((l) => {
        if (statusFilter === 'Visited' && l.visits.length === 0) return false;
        if (statusFilter === 'Not yet' && l.visits.length > 0) return false;
        if (search.trim()) {
          const q = search.trim().toLowerCase();
          if (!l.name.toLowerCase().includes(q) && !l.city.toLowerCase().includes(q)) return false;
        }
        return true;
      })
      .sort((a, b) => (a.city + a.name).localeCompare(b.city + b.name));
  }, [locations, search, statusFilter]);

  // Draw pins whenever the visible set or selection changes
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !mapReady || !window.L) return;
    const L = window.L;
    Object.values(markersRef.current).forEach((m) => m.remove());
    markersRef.current = {};
    visible.forEach((loc) => {
      if (loc.lat == null || loc.lng == null) return;
      const visited = loc.visits.length > 0;
      const selected = loc.id === selectedId;
      const w = selected ? 34 : 26;
      const h = Math.round(w * 1.33);
      const icon = L.divIcon({ className: '', html: pinHtml(visited, selected), iconSize: [w, h], iconAnchor: [w / 2, h - 1] });
      const m = L.marker([loc.lat, loc.lng], { icon, zIndexOffset: selected ? 1000 : 0 }).addTo(map);
      m.on('click', () => {
        setSelectedId(loc.id);
        setShowVisitForm(false);
        setTimeout(() => detailRef.current && detailRef.current.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
      });
      markersRef.current[loc.id] = m;
    });
  }, [visible, selectedId, mapReady]);

  // Preview pin while adding a custom stop
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !window.L) return;
    if (pendingMarkerRef.current) { pendingMarkerRef.current.remove(); pendingMarkerRef.current = null; }
    if (pendingCoords) {
      const icon = window.L.divIcon({ className: '', html: pinHtml(false, true), iconSize: [34, 45], iconAnchor: [17, 44] });
      pendingMarkerRef.current = window.L.marker([pendingCoords.lat, pendingCoords.lng], { icon, zIndexOffset: 2000 }).addTo(map);
    }
  }, [pendingCoords]);

  // Crosshair cursor while placing
  useEffect(() => {
    if (mapContainerRef.current) mapContainerRef.current.style.cursor = adding ? 'crosshair' : '';
  }, [adding]);

  async function persist(newLocations) {
    setLocations(newLocations);
    try { localStorage.setItem(STORAGE_KEY_LOCATIONS, JSON.stringify(newLocations)); } catch (e) { /* retry next save */ }
  }

  function handleAddVisit(locationId, visit) {
    const v = { id: Date.now().toString() + Math.random().toString(36).slice(2, 6), ...visit };
    persist(locations.map((l) => (l.id === locationId ? { ...l, visits: [v, ...l.visits] } : l)));
    setShowVisitForm(false);
  }

  function handleDeleteVisit(locationId, visitId) {
    persist(locations.map((l) => (l.id === locationId ? { ...l, visits: l.visits.filter((v) => v.id !== visitId) } : l)));
  }

  function handleDeleteLocation(locationId) {
    persist(locations.filter((l) => l.id !== locationId));
    if (selectedId === locationId) setSelectedId(null);
  }

  function toggleFavorite(locationId) {
    persist(locations.map((l) => (l.id === locationId ? { ...l, favorite: !l.favorite } : l)));
  }

  function handleSaveNewStop() {
    if (!pendingCoords) return;
    const name = newStopName.trim() || 'New stop';
    const loc = {
      id: 'custom-' + Date.now().toString() + Math.random().toString(36).slice(2, 6),
      name, city: name, state: 'WI',
      lat: pendingCoords.lat, lng: pendingCoords.lng, visits: [],
    };
    persist([loc, ...locations]);
    setPendingCoords(null);
    setNewStopName('');
    setSelectedId(loc.id);
  }

  function goTo(loc) {
    setTab('map');
    setSelectedId(loc.id);
    setShowVisitForm(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
    setTimeout(() => {
      const m = mapRef.current;
      if (m && loc.lat != null) {
        m.invalidateSize();
        m.flyTo([loc.lat, loc.lng], Math.max(m.getZoom(), 11), { duration: 0.8 });
      }
    }, 140);
  }

  const selected = locations.find((l) => l.id === selectedId) || null;
  const visitedCount = locations.filter((l) => l.visits.length > 0).length;
  const totalCount = locations.length;
  const progressPct = totalCount > 0 ? Math.round((visitedCount / totalCount) * 100) : 0;
  const allVisits = useMemo(
    () => locations
      .flatMap((l) => l.visits.map((v) => ({ ...v, locId: l.id, locName: l.name, locCity: l.city })))
      .sort((a, b) => b.date.localeCompare(a.date) || String(b.id).localeCompare(String(a.id))),
    [locations]
  );
  const avgRatingOverall = allVisits.length > 0 ? (allVisits.reduce((s, v) => s + v.rating, 0) / allVisits.length).toFixed(1) : null;
  const favoriteCount = locations.filter((l) => l.favorite).length;
  const nextMilestone = MILESTONES.find((m) => m > visitedCount);
  const nextUp = useMemo(
    () => locations
      .filter((l) => l.visits.length === 0 && l.lat != null)
      .map((l) => ({ loc: l, mi: milesBetween(MARSHALL, l) }))
      .sort((a, b) => a.mi - b.mi)
      .slice(0, 3),
    [locations]
  );
  const selectedAvg = selected && selected.visits.length > 0
    ? selected.visits.reduce((s, v) => s + v.rating, 0) / selected.visits.length
    : 0;

  const chip = (active) => active
    ? { backgroundColor: COLORS.blue, borderColor: COLORS.blue, color: '#FFFFFF' }
    : { backgroundColor: COLORS.card, borderColor: COLORS.border, color: COLORS.muted };

  let lastMonthKey = '';

  return (
    <div className="min-h-screen" style={{ backgroundColor: COLORS.bg, fontFamily: FONT_BODY }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,500;0,600;0,700;1,600;1,700&family=Barlow:wght@400;500;600;700&display=swap');`}</style>

      <div className="max-w-md mx-auto px-4 py-6">
        {/* Header */}
        <div className="rounded-3xl px-5 pt-5 pb-4 mb-4 shadow-sm border" style={{ backgroundColor: COLORS.card, borderColor: COLORS.border }}>
          <div className="flex items-start justify-between gap-3">
            <div>
              <p className="text-xs uppercase" style={{ color: COLORS.muted, fontFamily: FONT_DISPLAY, fontWeight: 600, letterSpacing: '0.14em' }}>
                Fan log · Wisconsin
              </p>
              <h1 className="text-4xl leading-none mt-1" style={{ fontFamily: FONT_DISPLAY, fontStyle: 'italic', fontWeight: 700 }}>
                <span style={{ color: COLORS.red }}>KWIK</span>{' '}
                <span style={{ color: COLORS.blue }}>TRIP</span>{' '}
                <span style={{ color: COLORS.ink }}>LOG</span>
              </h1>
              <GoldArrow width={104} />
            </div>
            <div className="text-right flex-shrink-0">
              <div className="text-3xl leading-none" style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, color: COLORS.blue }}>
                {visitedCount}<span style={{ color: COLORS.muted, fontWeight: 600 }}>/{totalCount}</span>
              </div>
              <div className="text-xs uppercase mt-0.5" style={{ color: COLORS.muted, fontFamily: FONT_DISPLAY, fontWeight: 600, letterSpacing: '0.1em' }}>visited</div>
            </div>
          </div>
          {/* Arrow progress bar */}
          <div className="relative mt-3" style={{ height: 14 }}>
            <div className="absolute left-0 rounded-full" style={{ top: 3, height: 8, width: '100%', backgroundColor: COLORS.border }} />
            <div className="absolute left-0 rounded-full transition-all" style={{ top: 3, height: 8, width: `${Math.min(progressPct, 97)}%`, backgroundColor: COLORS.gold }} />
            {progressPct > 0 && (
              <div
                className="absolute transition-all"
                style={{
                  left: `${Math.min(progressPct, 97)}%`, top: 0, width: 0, height: 0,
                  borderTop: '7px solid transparent', borderBottom: '7px solid transparent',
                  borderLeft: `10px solid ${COLORS.gold}`,
                }}
              />
            )}
          </div>
        </div>

        {/* Tabs */}
        <div className="flex rounded-full p-1 mb-4 border shadow-sm" style={{ backgroundColor: COLORS.card, borderColor: COLORS.border }}>
          {[{ key: 'map', label: 'Map', Icon: MapIcon }, { key: 'diary', label: 'Diary', Icon: BookOpen }].map(({ key, label, Icon }) => (
            <button
              key={key}
              type="button"
              onClick={() => setTab(key)}
              className={`flex-1 flex items-center justify-center gap-1.5 rounded-full py-2 text-sm font-semibold ${FOCUS_RING}`}
              style={tab === key ? { backgroundColor: COLORS.red, color: '#FFFFFF' } : { color: COLORS.muted }}
            >
              <Icon size={15} /> {label}
            </button>
          ))}
        </div>

        {loading ? (
          <p className="text-sm" style={{ color: COLORS.muted }}>Loading your log…</p>
        ) : (
          <>
            {/* ---------- MAP TAB ---------- */}
            <div style={{ display: tab === 'map' ? undefined : 'none' }}>
              <div className="flex items-center gap-2 rounded-lg px-3 py-2.5 border mb-2 shadow-sm" style={{ borderColor: COLORS.border, backgroundColor: COLORS.card }}>
                <Search size={15} style={{ color: COLORS.muted }} className="flex-shrink-0" />
                <input
                  type="text"
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder="Search a town or stop"
                  className={`flex-1 outline-none text-sm bg-transparent min-w-0 ${FOCUS_RING}`}
                  style={{ color: COLORS.ink, fontFamily: FONT_BODY }}
                />
                {search && (
                  <button type="button" onClick={() => setSearch('')} className={FOCUS_RING} aria-label="Clear search">
                    <X size={15} style={{ color: COLORS.muted }} />
                  </button>
                )}
              </div>

              <div className="flex gap-1.5 mb-3">
                {['All', 'Visited', 'Not yet'].map((s) => (
                  <button key={s} type="button" onClick={() => setStatusFilter(s)} className={`text-xs px-3 py-1 rounded-full border ${FOCUS_RING}`} style={chip(statusFilter === s)}>
                    {s}
                  </button>
                ))}
                <div className="flex-1" />
                <button
                  type="button"
                  onClick={() => { setAdding(!adding); setPendingCoords(null); }}
                  className={`text-xs px-3 py-1 rounded-full border flex items-center gap-1 ${FOCUS_RING}`}
                  style={adding ? { backgroundColor: COLORS.ink, borderColor: COLORS.ink, color: '#FFFFFF' } : { backgroundColor: COLORS.card, borderColor: COLORS.border, color: COLORS.muted }}
                >
                  <Plus size={12} /> {adding ? 'Cancel' : 'Add stop'}
                </button>
              </div>

              {adding && (
                <div className="rounded-lg px-3 py-2 mb-2 text-xs" style={{ backgroundColor: COLORS.goldSoft, color: COLORS.goldDeep }}>
                  Tap the map where the store is to drop a pin.
                </div>
              )}

              <div className="rounded-2xl overflow-hidden border shadow-sm mb-2" style={{ borderColor: COLORS.border }}>
                <div ref={mapContainerRef} style={{ height: 380, width: '100%', backgroundColor: COLORS.blueSoft }} />
              </div>
              <div className="flex items-center gap-4 mb-3 px-1 text-xs" style={{ color: COLORS.muted }}>
                <span className="flex items-center gap-1.5"><span className="inline-block w-2.5 h-2.5 rounded-full" style={{ backgroundColor: COLORS.gold }} /> visited</span>
                <span className="flex items-center gap-1.5"><span className="inline-block w-2.5 h-2.5 rounded-full border" style={{ backgroundColor: COLORS.card, borderColor: COLORS.red }} /> not yet</span>
                {avgRatingOverall && <span className="ml-auto">{avgRatingOverall}★ avg</span>}
              </div>

              {tileError && (
                <p className="text-xs mb-3" style={{ color: COLORS.muted }}>Some map tiles didn't load — pins still work, try scrolling or reopening.</p>
              )}

              {pendingCoords && (
                <div className="rounded-2xl p-4 mb-3 border shadow-sm space-y-2" style={{ backgroundColor: COLORS.card, borderColor: COLORS.border }}>
                  <Label>Name this stop</Label>
                  <input
                    type="text"
                    value={newStopName}
                    onChange={(e) => setNewStopName(e.target.value)}
                    placeholder="e.g. Deerfield, or Madison — Cottage Grove Rd"
                    className={`w-full rounded-lg px-3 py-2.5 text-sm border outline-none ${FOCUS_RING}`}
                    style={{ borderColor: COLORS.border, color: COLORS.ink, fontFamily: FONT_BODY }}
                  />
                  <div className="flex gap-2">
                    <button type="button" onClick={handleSaveNewStop} className={`flex-1 rounded-lg py-2 text-sm font-semibold hover:opacity-90 ${FOCUS_RING}`} style={{ backgroundColor: COLORS.red, color: '#FFFFFF' }}>
                      Save stop
                    </button>
                    <button type="button" onClick={() => { setPendingCoords(null); setNewStopName(''); }} className={`px-4 rounded-lg py-2 text-sm border hover:opacity-70 ${FOCUS_RING}`} style={{ backgroundColor: COLORS.card, borderColor: COLORS.border, color: COLORS.muted }}>
                      Cancel
                    </button>
                  </div>
                </div>
              )}

              {/* Selected stop detail */}
              {selected && (
                <div ref={detailRef} className="rounded-2xl p-4 mb-3 border shadow-sm" style={{ backgroundColor: COLORS.card, borderColor: selected.visits.length > 0 ? COLORS.gold : COLORS.border }}>
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-1.5 font-semibold" style={{ color: COLORS.ink }}>
                        <MapPin size={15} style={{ color: selected.visits.length > 0 ? COLORS.goldDeep : COLORS.red }} className="flex-shrink-0" />
                        <span className="truncate">{selected.name}</span>
                      </div>
                      <div className="text-xs mt-0.5" style={{ color: COLORS.muted }}>
                        {selected.name !== selected.city ? `${selected.city}, ` : ''}{selected.state}
                        {' · '}{Math.round(milesBetween(MARSHALL, selected))} mi from home
                        {selected.visits.length > 0 ? ` · ${selected.visits.length} visit${selected.visits.length > 1 ? 's' : ''}` : ' · not visited yet'}
                      </div>
                      {selected.visits.length > 0 && <div className="mt-1.5"><StarRating rating={selectedAvg} readOnly size={15} /></div>}
                    </div>
                    <div className="flex items-center gap-2 flex-shrink-0">
                      <button type="button" onClick={() => toggleFavorite(selected.id)} className={`transition-opacity hover:opacity-70 ${FOCUS_RING}`} aria-label={selected.favorite ? 'Remove from favorites' : 'Add to favorites'}>
                        <Heart size={17} color={COLORS.red} fill={selected.favorite ? COLORS.red : 'none'} />
                      </button>
                      <button type="button" onClick={() => handleDeleteLocation(selected.id)} className={`transition-opacity hover:opacity-60 ${FOCUS_RING}`} style={{ color: COLORS.muted }} aria-label="Remove location">
                        <Trash2 size={15} />
                      </button>
                      <button type="button" onClick={() => { setSelectedId(null); setShowVisitForm(false); }} className={`transition-opacity hover:opacity-60 ${FOCUS_RING}`} style={{ color: COLORS.muted }} aria-label="Close details">
                        <X size={16} />
                      </button>
                    </div>
                  </div>

                  {selected.visits.map((visit) => (
                    <div key={visit.id} className="mt-3 pt-3 border-t" style={{ borderColor: COLORS.border }}>
                      <div className="flex items-center justify-between">
                        <div className="flex items-center gap-2">
                          <span className="text-xs" style={{ color: COLORS.muted }}>
                            {new Date(visit.date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}
                          </span>
                          <StarRating rating={visit.rating} readOnly size={13} />
                        </div>
                        <button type="button" onClick={() => handleDeleteVisit(selected.id, visit.id)} className={`transition-opacity hover:opacity-60 ${FOCUS_RING}`} style={{ color: COLORS.muted }} aria-label="Delete visit">
                          <Trash2 size={14} />
                        </button>
                      </div>
                      {visit.tags && visit.tags.length > 0 && (
                        <div className="flex flex-wrap gap-1.5 mt-1.5">
                          {visit.tags.map((tag) => (
                            <span key={tag} className="text-xs px-2 py-0.5 rounded-full" style={{ backgroundColor: COLORS.blueSoft, color: COLORS.blue }}>{tag}</span>
                          ))}
                        </div>
                      )}
                      {visit.review && <p className="text-sm mt-1.5" style={{ color: COLORS.ink, opacity: 0.85 }}>{visit.review}</p>}
                    </div>
                  ))}

                  <div className="mt-3">
                    {showVisitForm ? (
                      <VisitForm onAdd={(v) => handleAddVisit(selected.id, v)} onCancel={() => setShowVisitForm(false)} />
                    ) : (
                      <button
                        type="button"
                        onClick={() => setShowVisitForm(true)}
                        className={`w-full rounded-lg py-2.5 text-sm font-semibold transition-opacity hover:opacity-90 ${FOCUS_RING}`}
                        style={{ backgroundColor: COLORS.red, color: '#FFFFFF' }}
                      >
                        {selected.visits.length > 0 ? 'Log another visit' : 'Log a visit'}
                      </button>
                    )}
                  </div>
                </div>
              )}

              {/* Next up: closest unvisited */}
              {!selected && nextUp.length > 0 && (
                <div className="rounded-2xl p-4 mb-3 border shadow-sm" style={{ backgroundColor: COLORS.card, borderColor: COLORS.border }}>
                  <div className="flex items-center gap-1.5 mb-2">
                    <Navigation size={14} style={{ color: COLORS.red }} />
                    <span className="text-sm uppercase" style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, letterSpacing: '0.08em', color: COLORS.ink }}>Next up</span>
                    <span className="text-xs ml-1" style={{ color: COLORS.muted }}>closest you haven't hit</span>
                  </div>
                  <div className="space-y-1.5">
                    {nextUp.map(({ loc, mi }) => (
                      <button key={loc.id} type="button" onClick={() => goTo(loc)} className={`w-full flex items-center gap-2 rounded-xl px-3 py-2 border text-left ${FOCUS_RING}`} style={{ backgroundColor: COLORS.bg, borderColor: COLORS.border }}>
                        <span className="inline-block w-2.5 h-2.5 rounded-full border flex-shrink-0" style={{ backgroundColor: COLORS.card, borderColor: COLORS.red }} />
                        <span className="flex-1 text-sm font-medium truncate" style={{ color: COLORS.ink }}>{loc.name}</span>
                        <span className="text-xs flex-shrink-0" style={{ color: COLORS.blue, fontFamily: FONT_DISPLAY, fontWeight: 700 }}>{Math.round(mi)} MI</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Full list */}
              <div className="flex items-baseline justify-between mt-4 mb-2 px-1">
                <h2 className="text-lg uppercase" style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, color: COLORS.ink, letterSpacing: '0.05em' }}>All stops</h2>
                <span className="text-xs" style={{ color: COLORS.muted }}>{visible.length} shown</span>
              </div>

              <div className="space-y-1.5">
                {visible.length === 0 && (
                  <div className="text-center py-8">
                    <MapPin size={26} style={{ color: COLORS.border }} className="mx-auto mb-2" />
                    <p className="text-sm" style={{ color: COLORS.muted }}>No stops match — try a different search.</p>
                  </div>
                )}
                {visible.map((loc) => {
                  const visited = loc.visits.length > 0;
                  const avg = visited ? loc.visits.reduce((s, v) => s + v.rating, 0) / loc.visits.length : 0;
                  return (
                    <button
                      key={loc.id}
                      type="button"
                      onClick={() => goTo(loc)}
                      className={`w-full flex items-center gap-3 rounded-xl px-3 py-2.5 border text-left shadow-sm ${FOCUS_RING}`}
                      style={{ backgroundColor: loc.id === selectedId ? COLORS.goldSoft : COLORS.card, borderColor: loc.id === selectedId ? COLORS.gold : COLORS.border }}
                    >
                      <span
                        className="inline-block w-2.5 h-2.5 rounded-full flex-shrink-0 border"
                        style={visited ? { backgroundColor: COLORS.gold, borderColor: COLORS.gold } : { backgroundColor: COLORS.card, borderColor: COLORS.red }}
                      />
                      <span className="flex-1 min-w-0">
                        <span className="block text-sm font-medium truncate" style={{ color: COLORS.ink }}>
                          {loc.name}
                          {loc.favorite && <Heart size={11} color={COLORS.red} fill={COLORS.red} className="inline ml-1.5" style={{ verticalAlign: 'baseline' }} />}
                        </span>
                        {loc.name !== loc.city && <span className="block text-xs" style={{ color: COLORS.muted }}>{loc.city}</span>}
                      </span>
                      {visited && (
                        <span className="flex items-center gap-1 flex-shrink-0">
                          <StarRating rating={avg} readOnly size={12} />
                          {loc.visits.length > 1 && <span className="text-xs" style={{ color: COLORS.muted }}>×{loc.visits.length}</span>}
                        </span>
                      )}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* ---------- DIARY TAB ---------- */}
            {tab === 'diary' && (
              <div>
                <div className="grid grid-cols-3 gap-2 mb-3">
                  {[
                    { big: `${visitedCount}`, small: 'stops visited' },
                    { big: `${allVisits.length}`, small: 'total visits' },
                    { big: avgRatingOverall ? `${avgRatingOverall}★` : '—', small: 'avg rating' },
                  ].map((s, i) => (
                    <div key={i} className="rounded-2xl px-3 py-3 border shadow-sm text-center" style={{ backgroundColor: COLORS.card, borderColor: COLORS.border }}>
                      <div className="text-2xl leading-none" style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, color: COLORS.blue }}>{s.big}</div>
                      <div className="text-xs uppercase mt-1" style={{ color: COLORS.muted, fontFamily: FONT_DISPLAY, fontWeight: 600, letterSpacing: '0.08em' }}>{s.small}</div>
                    </div>
                  ))}
                </div>

                {/* Milestones */}
                <div className="rounded-2xl p-4 mb-4 border shadow-sm" style={{ backgroundColor: COLORS.card, borderColor: COLORS.border }}>
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-sm uppercase" style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, letterSpacing: '0.08em', color: COLORS.ink }}>Milestones</span>
                    {favoriteCount > 0 && (
                      <span className="text-xs flex items-center gap-1" style={{ color: COLORS.muted }}>
                        <Heart size={11} color={COLORS.red} fill={COLORS.red} /> {favoriteCount} favorite{favoriteCount > 1 ? 's' : ''}
                      </span>
                    )}
                  </div>
                  <div className="flex flex-wrap gap-1.5">
                    {MILESTONES.map((m) => {
                      const hit = visitedCount >= m;
                      return (
                        <span key={m} className="text-xs px-2.5 py-1 rounded-full border font-semibold" style={hit
                          ? { backgroundColor: COLORS.gold, borderColor: COLORS.gold, color: COLORS.ink }
                          : { backgroundColor: COLORS.card, borderColor: COLORS.border, color: COLORS.muted }}>
                          {m}
                        </span>
                      );
                    })}
                  </div>
                  <p className="text-xs mt-2" style={{ color: COLORS.muted }}>
                    {visitedCount >= totalCount && totalCount > 0
                      ? "Every stop on your list. Legend."
                      : nextMilestone
                        ? `${nextMilestone - visitedCount} more to hit ${nextMilestone} stops.`
                        : `${totalCount - visitedCount} to go for the full list.`}
                  </p>
                </div>

                {/* Visit feed */}
                <h2 className="text-lg uppercase mb-2 px-1" style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, color: COLORS.ink, letterSpacing: '0.05em' }}>Your diary</h2>
                {allVisits.length === 0 ? (
                  <div className="text-center py-10">
                    <BookOpen size={26} style={{ color: COLORS.border }} className="mx-auto mb-2" />
                    <p className="text-sm" style={{ color: COLORS.muted }}>No visits logged yet — hit the map and tick off your first stop.</p>
                  </div>
                ) : (
                  <div className="space-y-1.5">
                    {allVisits.map((v) => {
                      const monthKey = v.date.slice(0, 7);
                      const showMonth = monthKey !== lastMonthKey;
                      lastMonthKey = monthKey;
                      const d = new Date(v.date + 'T00:00:00');
                      return (
                        <React.Fragment key={v.id}>
                          {showMonth && (
                            <div className="pt-3 pb-1 px-1 text-xs uppercase" style={{ color: COLORS.muted, fontFamily: FONT_DISPLAY, fontWeight: 700, letterSpacing: '0.12em' }}>
                              {d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}
                            </div>
                          )}
                          <button type="button" onClick={() => { const loc = locations.find((l) => l.id === v.locId); if (loc) goTo(loc); }} className={`w-full flex gap-3 rounded-xl px-3 py-2.5 border text-left shadow-sm ${FOCUS_RING}`} style={{ backgroundColor: COLORS.card, borderColor: COLORS.border }}>
                            <span className="flex flex-col items-center justify-center rounded-lg px-2 py-1 flex-shrink-0" style={{ backgroundColor: COLORS.blueSoft, minWidth: 40 }}>
                              <span className="text-xs uppercase leading-none" style={{ color: COLORS.blue, fontFamily: FONT_DISPLAY, fontWeight: 700 }}>{d.toLocaleDateString('en-US', { month: 'short' })}</span>
                              <span className="text-base leading-tight" style={{ color: COLORS.blue, fontFamily: FONT_DISPLAY, fontWeight: 700 }}>{d.getDate()}</span>
                            </span>
                            <span className="flex-1 min-w-0">
                              <span className="block text-sm font-semibold truncate" style={{ color: COLORS.ink }}>{v.locName}</span>
                              <StarRating rating={v.rating} readOnly size={12} />
                              {v.tags && v.tags.length > 0 && (
                                <span className="block text-xs truncate mt-0.5" style={{ color: COLORS.blue }}>{v.tags.join(' · ')}</span>
                              )}
                              {v.review && <span className="block text-xs mt-0.5" style={{ color: COLORS.muted }}>"{v.review}"</span>}
                            </span>
                          </button>
                        </React.Fragment>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<KwikTripLog />);
</script>
</body>
</html>
